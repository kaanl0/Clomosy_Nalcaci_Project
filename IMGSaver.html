<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clomosy Taktik Tahtası</title>
    <style>
        body {
            background-color: #071109;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background-color: #08160D;
            border: 2px solid #173522;
            border-radius: 10px;
            padding: 20px;
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        canvas {
            max-width: 100%;
            height: auto;
            border: 4px solid #002db3;
            border-radius: 4px;
            margin-top: 15px;
            display: none; 
        }
        #finalImage {
            max-width: 100%;
            border: 4px solid #3DE482;
            border-radius: 4px;
            margin-top: 15px;
            display: none; 
        }
        .log { color: #3DE482; font-family: sans-serif; margin-top: 10px; font-size: 16px; line-height: 1.5; font-weight:bold; }
        .error { color: #EF4444; }
        
        /* MANUEL YAPIŞTIRMA KUTUSU TASARIMI */
        #pasteArea {
            margin-top: 25px;
            padding: 15px;
            background-color: #0D1F14;
            border: 2px dashed #3DE482;
            border-radius: 10px;
        }
        #dataInput {
            width: 90%;
            height: 60px;
            margin-top: 10px;
            background-color: #08160D;
            border: 1px solid #173522;
            color: #ffffff;
            font-size: 16px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            resize: none;
        }
        #dataInput:focus {
            outline: none;
            border-color: #3DE482;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Taktik Tahtası</h2>
        <div id="statusLog" class="log">Taktik başarıyla kopyalandı! ✅</div>
        
        <!-- YENİ: İZİN İSTEMEYEN YAPIŞTIRMA ALANI -->
        <div id="pasteArea">
            <p style="color: #F59E0B; font-weight: bold; margin: 0 0 10px 0;">👇 Görseli indirmek için aşağıdaki kutuya basılı tutun ve "Yapıştır" deyin 👇</p>
            <textarea id="dataInput" placeholder="Buraya basılı tutun ve Yapıştırın..."></textarea>
        </div>
        
        <canvas id="renderCanvas"></canvas>
        <img id="finalImage" alt="Oluşturulan Taktik" />
    </div>

<script>
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');
        const statusLog = document.getElementById('statusLog');
        const finalImage = document.getElementById('finalImage');
        
        const pasteArea = document.getElementById('pasteArea');
        const dataInput = document.getElementById('dataInput');

        const ASSETS = {
            Background: 'https://raw.githubusercontent.com/kaanl0/Clomosy_Nalcaci_Project/main/dikeysaha2.jpg', // Mobil Saha
            Ball: 'https://raw.githubusercontent.com/kaanl0/Clomosy_Nalcaci_Project/main/ball.png'
        };
        const loadedImages = {};
        let isAssetsLoaded = false;

        function preloadImages(callback) {
            let loadedCount = 0;
            const keys = Object.keys(ASSETS);
            keys.forEach(key => {
                const img = new Image();
                img.crossOrigin = "Anonymous"; 
                img.onload = () => {
                    loadedImages[key] = img;
                    loadedCount++;
                    if (loadedCount === keys.length) {
                        isAssetsLoaded = true;
                        if(callback) callback();
                    }
                };
                img.src = ASSETS[key];
            });
        }
        preloadImages(); 

        // =======================================================
        // YENİ MANTIK: KUTUYA METİN GİRİLDİĞİ AN OTOMATİK ÇALIŞIR
        // =======================================================
        dataInput.addEventListener('input', function() {
            const pastedData = dataInput.value.trim();
            
            // Kullanıcı veriyi yapıştırdıysa ve bu bizim JSON ise
            if (pastedData.includes("type") && pastedData.includes("x") && pastedData.includes("y")) {
                pasteArea.style.display = 'none'; // Kutu görevini yaptı, gizle
                statusLog.innerText = "Veri alındı, görsel çiziliyor...";
                
                // Biraz bekle ki "Çiziliyor" yazısı ekranda görünebilsin
                setTimeout(() => {
                    renderAndDownload(pastedData);
                }, 100);
            } else {
                statusLog.className = "log error";
                statusLog.innerText = "Hatalı veya eksik veri yapıştırdınız! Lütfen uygulamaya dönüp tekrar 'SS Al' deyin.";
                dataInput.value = ''; // Yanlış veriyi temizle
            }
        });

        function renderAndDownload(jsonPayload) {
            try {
                if (!isAssetsLoaded) {
                    throw new Error("Görseller henüz yüklenmedi, lütfen sayfayı yenileyip tekrar yapıştırın.");
                }

                const elements = typeof jsonPayload === 'string' ? JSON.parse(jsonPayload) : jsonPayload;
                const bgImg = loadedImages.Background;
                canvas.width = bgImg.width;
                canvas.height = bgImg.height;

                // 1. Arka planı çiz
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);

                // 2. Elementleri çiz
                elements.forEach(el => {
                    const cx = el.x * canvas.width;
                    const cy = el.y * canvas.height;
                    const w = el.width * canvas.width;
                    const h = el.height * canvas.height;
                    const angleRad = el.angle * (Math.PI / 180);

                    ctx.save();
                    ctx.translate(cx, cy);
                    ctx.rotate(angleRad);

                    if (el.type === 'Ball' && loadedImages.Ball) {
                        ctx.drawImage(loadedImages.Ball, -w / 2, -h / 2, w, h);
                    } 
                    else if (el.type === 'Player' || el.type === 'Opponent') {
                        ctx.beginPath();
                        ctx.ellipse(0, 0, w / 2, h / 2, 0, 0, 2 * Math.PI);
                        ctx.fillStyle = el.type === 'Player' ? "#3B82F6" : "#EF4444";
                        ctx.fill();
                        ctx.lineWidth = 2; 
                        ctx.strokeStyle = "#FFFFFF"; 
                        ctx.stroke();
                    } 
                    else if (el.type === 'Line') { 
                        ctx.strokeStyle = "#EF4444"; 
                        ctx.lineWidth = Math.max(h, 3);
                        ctx.lineCap = "round"; 
                        ctx.beginPath();
                        ctx.moveTo(-w / 2, 0);
                        ctx.lineTo(w / 2, 0);
                        ctx.stroke();
                    } 
                    else if (el.type === 'Arrow') {
                        ctx.strokeStyle = "#EF4444"; 
                        ctx.lineWidth = Math.max(h, 3); 
                        ctx.lineCap = "round"; 
                        ctx.lineJoin = "round"; 
                        const startX = -w / 2;
                        const endX = w / 2;
                        
                        ctx.beginPath();
                        ctx.moveTo(startX, 0);
                        ctx.lineTo(endX, 0);
                        const headLength = 15; 
                        const headAngle = Math.PI / 6; 
                        ctx.moveTo(endX, 0);
                        ctx.lineTo(endX - headLength * Math.cos(headAngle), -headLength * Math.sin(headAngle));
                        ctx.moveTo(endX, 0);
                        ctx.lineTo(endX - headLength * Math.cos(headAngle), headLength * Math.sin(headAngle));
                        ctx.stroke();
                    }
                    else if (el.type === 'Rect') { 
                        ctx.strokeStyle = "#EF4444"; 
                        ctx.lineWidth = 3; 
                        ctx.strokeRect(-w / 2, -h / 2, w, h); 
                    } 
                    else if (el.type === 'Circle') { 
                        ctx.strokeStyle = "#EF4444"; 
                        ctx.lineWidth = 3; 
                        ctx.beginPath(); 
                        ctx.ellipse(0, 0, w / 2, h / 2, 0, 0, 2 * Math.PI); 
                        ctx.stroke(); 
                    } 
                    else if (el.type === 'Text' && el.text_content) { 
                        ctx.fillStyle = "#FFFFFF"; 
                        ctx.font = "bold 20px Arial"; 
                        ctx.textAlign = "center"; 
                        ctx.textBaseline = "middle"; 
                        ctx.fillText(el.text_content, 0, 0); 
                    }

                    ctx.restore();
                });

                // OTOMATİK İNDİRME VE GÖSTERME İŞLEMİ
                const dataURL = canvas.toDataURL("image/png");
                
                finalImage.src = dataURL;
                finalImage.style.display = 'block';

                const link = document.createElement('a');
                link.download = 'Nalcaci_Taktik.png';
                link.href = dataURL;
                link.click(); 

                statusLog.innerText = "Harika! Görsel başarıyla galerinize indirildi.";
                
            } catch (error) {
                statusLog.className = "log error";
                statusLog.innerText = "Çizim Hatası: " + error.message;
                pasteArea.style.display = 'block'; // Hata olursa kutuyu geri getir
            }
        }
    </script>
</body>
</html>
