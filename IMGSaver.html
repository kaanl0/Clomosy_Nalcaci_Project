<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clomosy Taktik Tahtası</title>
    <style>
        body {
            background-color: #071109;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background-color: #08160D;
            border: 2px solid #173522;
            border-radius: 10px;
            padding: 20px;
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        canvas {
            max-width: 100%;
            height: auto;
            border: 4px solid #002db3;
            border-radius: 4px;
            margin-top: 15px;
            display: none; 
        }
        #finalImage {
            max-width: 100%;
            border: 4px solid #3DE482;
            border-radius: 4px;
            margin-top: 15px;
            display: none; 
        }
        .action-btn {
            background-color: #16A64B;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 300px;
        }
        .action-btn:hover { background-color: #209400; }
        .log { color: #3DE482; font-family: sans-serif; margin-top: 10px; font-size: 15px; line-height: 1.5; }
        .error { color: #EF4444; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Taktik Tahtası</h2>
        <div id="statusLog" class="log">Taktik verisi hafızaya kopyalandı.<br>Görseli indirmek için aşağıdaki butona tıklayın.</div>
        
        <!-- Tarayıcı Güvenliğini Aşmak İçin Tıklama Butonu -->
        <button id="pasteBtn" class="action-btn" onclick="readFromClipboard()">📸 Görseli Oluştur</button>
        
        <canvas id="renderCanvas"></canvas>
        <img id="finalImage" alt="Oluşturulan Taktik" />
    </div>

<script>
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');
        const statusLog = document.getElementById('statusLog');
        const finalImage = document.getElementById('finalImage');
        const pasteBtn = document.getElementById('pasteBtn');

        const ASSETS = {
            Background: 'https://raw.githubusercontent.com/kaanl0/Clomosy_Nalcaci_Project/main/yataysaha2.jpg',
            Ball: 'https://raw.githubusercontent.com/kaanl0/Clomosy_Nalcaci_Project/main/ball.png'
        };
        const loadedImages = {};

        // Resimleri önceden yükle
        let isAssetsLoaded = false;
        function preloadImages(callback) {
            let loadedCount = 0;
            const keys = Object.keys(ASSETS);
            keys.forEach(key => {
                const img = new Image();
                img.crossOrigin = "Anonymous"; 
                img.onload = () => {
                    loadedImages[key] = img;
                    loadedCount++;
                    if (loadedCount === keys.length) {
                        isAssetsLoaded = true;
                        if(callback) callback();
                    }
                };
                img.src = ASSETS[key];
            });
        }
        preloadImages(); // Sayfa açılır açılmaz arka planda indirsin

        function renderAndDownload(jsonPayload) {
            try {
                const elements = typeof jsonPayload === 'string' ? JSON.parse(jsonPayload) : jsonPayload;
                const bgImg = loadedImages.Background;
                canvas.width = bgImg.width;
                canvas.height = bgImg.height;

                // 1. Arka planı çiz
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);

                // 2. Elementleri çiz
                elements.forEach(el => {
                    const cx = el.x * canvas.width;
                    const cy = el.y * canvas.height;
                    const w = el.width * canvas.width;
                    const h = el.height * canvas.height;
                    const angleRad = el.angle * (Math.PI / 180);

                    ctx.save();
                    ctx.translate(cx, cy);
                    ctx.rotate(angleRad);

                    if (el.type === 'Ball' && loadedImages.Ball) {
                        ctx.drawImage(loadedImages.Ball, -w / 2, -h / 2, w, h);
                    } 
                    else if (el.type === 'Player' || el.type === 'Opponent') {
                        ctx.beginPath();
                        ctx.ellipse(0, 0, w / 2, h / 2, 0, 0, 2 * Math.PI);
                        ctx.fillStyle = el.type === 'Player' ? "#3B82F6" : "#EF4444";
                        ctx.fill();
                        ctx.lineWidth = 2; 
                        ctx.strokeStyle = "#FFFFFF"; 
                        ctx.stroke();
                    } 
                    else if (el.type === 'Line') { 
                        ctx.strokeStyle = "#EF4444"; 
                        ctx.lineWidth = Math.max(h, 3);
                        ctx.lineCap = "round"; 
                        ctx.beginPath();
                        ctx.moveTo(-w / 2, 0);
                        ctx.lineTo(w / 2, 0);
                        ctx.stroke();
                    } 
                    else if (el.type === 'Arrow') {
                        ctx.strokeStyle = "#EF4444"; 
                        ctx.lineWidth = Math.max(h, 3); 
                        ctx.lineCap = "round"; 
                        ctx.lineJoin = "round"; 
                        const startX = -w / 2;
                        const endX = w / 2;
                        
                        ctx.beginPath();
                        ctx.moveTo(startX, 0);
                        ctx.lineTo(endX, 0);
                        const headLength = 15; 
                        const headAngle = Math.PI / 6; 
                        ctx.moveTo(endX, 0);
                        ctx.lineTo(endX - headLength * Math.cos(headAngle), -headLength * Math.sin(headAngle));
                        ctx.moveTo(endX, 0);
                        ctx.lineTo(endX - headLength * Math.cos(headAngle), headLength * Math.sin(headAngle));
                        ctx.stroke();
                    }
                    else if (el.type === 'Rect') { 
                        ctx.strokeStyle = "#EF4444"; 
                        ctx.lineWidth = 3; 
                        ctx.strokeRect(-w / 2, -h / 2, w, h); 
                    } 
                    else if (el.type === 'Circle') { 
                        ctx.strokeStyle = "#EF4444"; 
                        ctx.lineWidth = 3; 
                        ctx.beginPath(); 
                        ctx.ellipse(0, 0, w / 2, h / 2, 0, 0, 2 * Math.PI); 
                        ctx.stroke(); 
                    } 
                    else if (el.type === 'Text' && el.text_content) { 
                        ctx.fillStyle = "#FFFFFF"; 
                        ctx.font = "bold 20px Arial"; 
                        ctx.textAlign = "center"; 
                        ctx.textBaseline = "middle"; 
                        ctx.fillText(el.text_content, 0, 0); 
                    }
                    ctx.restore();
                });

                // OTOMATİK İNDİRME VE GÖSTERME İŞLEMİ
                const dataURL = canvas.toDataURL("image/png");
                
                finalImage.src = dataURL;
                finalImage.style.display = 'block';

                const link = document.createElement('a');
                link.download = 'Nalcaci_Taktik.png';
                link.href = dataURL;
                link.click(); 

                statusLog.innerText = "Harika! Görsel başarıyla cihazınıza indirildi.";
                
                // Güvenlik için işlemi bitince panoyu temizle
                navigator.clipboard.writeText("");
                
            } catch (error) {
                statusLog.className = "log error";
                statusLog.innerText = "Kritik Çizim Hatası: " + error.message;
                pasteBtn.style.display = 'inline-block';
            }
        }

        // =======================================================
        // GÜVENLİ: BUTONA TIKLANDIĞINDA PANODAN VERİ OKUMA
        // =======================================================
        async function readFromClipboard() {
            if (!isAssetsLoaded) {
                statusLog.innerText = "Saha görselleri yükleniyor, lütfen 1 saniye bekleyip tekrar tıklayın...";
                return;
            }

            pasteBtn.style.display = 'none'; // Tıklanınca butonu gizle
            statusLog.innerText = "Lütfen tarayıcının panoya (yapıştırmaya) erişmesine 'İzin Ver' diyerek onaylayın...";

            try {
                // Tarayıcı bu noktada kullanıcıya "İzin verilsin mi?" diye sorabilir
                const clipboardText = await navigator.clipboard.readText();
                
                // Pano dolu mu ve JSON mantığına benziyor mu kontrolü
                if (clipboardText && clipboardText.includes("type")) {
                     statusLog.innerText = "Veri alındı, taktik tahtası çiziliyor...";
                     renderAndDownload(clipboardText);
                } else {
                     statusLog.className = "log error";
                     statusLog.innerText = "Hafızada geçerli bir taktik verisi bulunamadı! Lütfen uygulamaya dönüp 'SS Al' butonuna tekrar basın.";
                     pasteBtn.style.display = 'inline-block';
                }
            } catch (err) {
                statusLog.className = "log error";
                statusLog.innerText = "Panoya erişim engellendi. Tarayıcınızın ayarlarına gidip 'Pano (Clipboard)' iznini açmanız gerekiyor.";
                pasteBtn.style.display = 'inline-block';
            }
        }
    </script>
</body>
</html>
