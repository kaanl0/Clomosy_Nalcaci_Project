<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobil Taktik İndirici</title>
    <style>
        body { 
            background-color: #08160D; color: #ffffff; font-family: sans-serif; margin: 0; padding: 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; box-sizing: border-box; text-align: center; 
        }
        .log { color: #3DE482; font-size: 20px; font-weight: bold; margin-bottom: 20px; }
        
        /* TRUVA ATI BUTONU: CLOMOSY'DEN KAÇIŞ */
        .btn-link { 
            background-color: #16A64B; color: white; padding: 20px 30px; font-size: 18px; font-weight: bold; 
            border-radius: 12px; border: none; cursor: pointer; display: none; width: 100%; max-width: 350px; 
            box-shadow: 0px 4px 15px rgba(22, 166, 75, 0.4); 
        }
        .btn-link:active { background-color: #11823B; transform: scale(0.98); }
        
        .spinner { border: 4px solid rgba(61, 228, 130, 0.3); width: 50px; height: 50px; border-radius: 50%; border-left-color: #3DE482; animation: spin 1s linear infinite; margin-bottom: 20px; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        canvas { display: none; } 
    </style>
</head>
<body>

    <div id="spinner" class="spinner"></div>
    <div id="statusLog" class="log">Yükleniyor...</div>
    
    <!-- CLOMOSY İÇİNDE GÖSTERİLECEK BYPASS BUTONU -->
    <button id="bypassBtn" class="btn-link">🚀 Chrome'da Aç ve İndir</button>

    <canvas id="renderCanvas"></canvas>

<script>
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');
        const statusLog = document.getElementById('statusLog');
        const bypassBtn = document.getElementById('bypassBtn');
        const spinner = document.getElementById('spinner');

        const ASSETS = { Background: 'https://raw.githubusercontent.com/kaanl0/Clomosy_Nalcaci_Project/main/yataysaha2.jpg', Ball: 'https://raw.githubusercontent.com/kaanl0/Clomosy_Nalcaci_Project/main/ball.png' };
        const loadedImages = {};

        function preloadImages(callback) {
            let loadedCount = 0; const keys = Object.keys(ASSETS);
            keys.forEach(key => {
                const img = new Image(); img.crossOrigin = "Anonymous"; 
                img.onload = () => { loadedImages[key] = img; loadedCount++; if (loadedCount === keys.length) callback(); };
                img.src = ASSETS[key];
            });
        }

        // ÖZGÜR TARAYICI İÇİN OTOMATİK İNDİRME MANTIĞI
        function forceDownload(jsonPayload) {
            try {
                const elements = typeof jsonPayload === 'string' ? JSON.parse(jsonPayload) : jsonPayload;
                const bgImg = loadedImages.Background;
                canvas.width = bgImg.width; canvas.height = bgImg.height;
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);

                elements.forEach(el => {
                    const cx = el.x * canvas.width; const cy = el.y * canvas.height;
                    const w = el.width * canvas.width; const h = el.height * canvas.height;
                    const angleRad = el.angle * (Math.PI / 180);

                    ctx.save(); ctx.translate(cx, cy); ctx.rotate(angleRad);

                    if (el.type === 'Ball' && loadedImages.Ball) {
                        ctx.drawImage(loadedImages.Ball, -w / 2, -h / 2, w, h);
                    } else if (el.type === 'Player' || el.type === 'Opponent') {
                        ctx.beginPath(); ctx.ellipse(0, 0, w / 2, h / 2, 0, 0, 2 * Math.PI);
                        ctx.fillStyle = el.type === 'Player' ? "#3B82F6" : "#EF4444"; ctx.fill();
                        ctx.lineWidth = 2; ctx.strokeStyle = "#FFFFFF"; ctx.stroke();
                    } else if (el.type === 'Line' || el.type === 'Arrow') { 
                        ctx.fillStyle = "#EF4444"; ctx.fillRect(-w / 2, -h / 2, w, Math.max(h, 4)); 
                    } else if (el.type === 'Rect') { 
                        ctx.strokeStyle = "#EF4444"; ctx.lineWidth = 3; ctx.strokeRect(-w / 2, -h / 2, w, h); 
                    } else if (el.type === 'Circle') { 
                        ctx.strokeStyle = "#EF4444"; ctx.lineWidth = 3; ctx.beginPath(); ctx.ellipse(0, 0, w / 2, h / 2, 0, 0, 2 * Math.PI); ctx.stroke(); 
                    } else if (el.type === 'Text' && el.text_content) { 
                        ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 20px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(el.text_content, 0, 0); 
                    }
                    ctx.restore();
                });

                canvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.download = 'Nalcaci_Taktik_' + new Date().getTime() + '.png';
                    link.href = url;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    spinner.style.display = 'none';
                    statusLog.innerHTML = "✅ İndirme Başarılı!<br><br><span style='font-size:16px; color:#ffffff;'>Bu sekmeyi kapatıp uygulamaya dönebilirsiniz.</span>";
                }, 'image/png');

            } catch (error) { statusLog.innerText = "Hata: " + error.message; }
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const dataParam = urlParams.get('data');
            const isDownloadMode = urlParams.get('download');

            if (dataParam) {
                if (isDownloadMode) {
                    // 2. AŞAMA: DIŞ TARAYICIDAYIZ (CHROME/SAFARI) -> ÇİZ VE OTOMATİK İNDİR
                    spinner.style.display = 'block';
                    statusLog.innerText = "Taktik İşleniyor ve İndiriliyor...";
                    preloadImages(() => forceDownload(dataParam));
                } else {
                    // 1. AŞAMA: CLOMOSY WEBVIEW İÇİNDEYİZ -> BYPASS BUTONUNU GÖSTER
                    spinner.style.display = 'none';
                    statusLog.innerText = "Taktik İndirilmeye Hazır!";
                    bypassBtn.style.display = 'block';
                    
                    bypassBtn.onclick = () => {
                        // Linke download=1 ekle
                        const rawUrl = "kaanl0.github.io/Clomosy_Nalcaci_Project/IMGSaverMobile.html?data=" + encodeURIComponent(dataParam) + "&download=1";
                        
                        // ANDROID INTENT (WebView'ı yıkar geçer ve Chrome'u zorla açar)
                        const androidIntent = "intent://" + rawUrl + "#Intent;scheme=https;package=com.android.chrome;end";
                        
                        window.location.href = androidIntent;
                        
                        // iOS Safari ve Hata Durumları İçin Fallback (Yedek Plan)
                        setTimeout(() => {
                            window.top.location.href = "https://" + rawUrl;
                        }, 1000);
                    };
                }
            }
        };
    </script>
</body>
</html>
