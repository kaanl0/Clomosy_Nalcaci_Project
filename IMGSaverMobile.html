<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taktik İndirici</title>
    <style>
        body {
            background-color: #08160D;
            color: #ffffff;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        .log { color: #3DE482; font-size: 22px; font-weight: bold; margin-bottom: 20px; }
        .sub-log { color: #FFFFFF; font-size: 16px; line-height: 1.5; }
        .spinner { border: 4px solid rgba(61, 228, 130, 0.3); width: 50px; height: 50px; border-radius: 50%; border-left-color: #3DE482; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        canvas { display: none; } 
    </style>
</head>
<body>

    <div class="spinner" id="spinner"></div>
    <div id="statusLog" class="log">Taktik İşleniyor...</div>
    <div id="subLog" class="sub-log">Lütfen indirme işlemi bitene kadar bekleyin.</div>

    <canvas id="renderCanvas"></canvas>

<script>
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');
        const statusLog = document.getElementById('statusLog');
        const subLog = document.getElementById('subLog');
        const spinner = document.getElementById('spinner');

        const ASSETS = {
            Background: 'https://raw.githubusercontent.com/kaanl0/Clomosy_Nalcaci_Project/main/yataysaha2.jpg',
            Ball: 'https://raw.githubusercontent.com/kaanl0/Clomosy_Nalcaci_Project/main/ball.png'
        };
        const loadedImages = {};

        function preloadImages(callback) {
            let loadedCount = 0;
            const keys = Object.keys(ASSETS);
            keys.forEach(key => {
                const img = new Image();
                img.crossOrigin = "Anonymous"; 
                img.onload = () => { loadedImages[key] = img; loadedCount++; if (loadedCount === keys.length) callback(); };
                img.onerror = () => { statusLog.innerText = "Hata oluştu!"; spinner.style.display = 'none'; };
                img.src = ASSETS[key];
            });
        }

        function renderAndDownload(jsonPayload) {
            try {
                const elements = typeof jsonPayload === 'string' ? JSON.parse(jsonPayload) : jsonPayload;
                const bgImg = loadedImages.Background;
                
                canvas.width = bgImg.width;
                canvas.height = bgImg.height;
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);

                elements.forEach(el => {
                    const cx = el.x * canvas.width;
                    const cy = el.y * canvas.height;
                    const w = el.width * canvas.width;
                    const h = el.height * canvas.height;
                    const angleRad = el.angle * (Math.PI / 180);

                    ctx.save();
                    ctx.translate(cx, cy);
                    ctx.rotate(angleRad);

                    if (el.type === 'Ball' && loadedImages.Ball) {
                        ctx.drawImage(loadedImages.Ball, -w / 2, -h / 2, w, h);
                    } else if (el.type === 'Player' || el.type === 'Opponent') {
                        ctx.beginPath();
                        ctx.ellipse(0, 0, w / 2, h / 2, 0, 0, 2 * Math.PI);
                        ctx.fillStyle = el.type === 'Player' ? "#3B82F6" : "#EF4444";
                        ctx.fill();
                        ctx.lineWidth = 2; ctx.strokeStyle = "#FFFFFF"; ctx.stroke();
                    } else if (el.type === 'Line' || el.type === 'Arrow') { 
                        ctx.fillStyle = "#EF4444"; ctx.fillRect(-w / 2, -h / 2, w, Math.max(h, 4)); 
                    } else if (el.type === 'Rect') { 
                        ctx.strokeStyle = "#EF4444"; ctx.lineWidth = 3; ctx.strokeRect(-w / 2, -h / 2, w, h); 
                    } else if (el.type === 'Circle') { 
                        ctx.strokeStyle = "#EF4444"; ctx.lineWidth = 3; ctx.beginPath(); ctx.ellipse(0, 0, w / 2, h / 2, 0, 0, 2 * Math.PI); ctx.stroke(); 
                    } else if (el.type === 'Text' && el.text_content) { 
                        ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 20px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(el.text_content, 0, 0); 
                    }
                    ctx.restore();
                });

                // ÖZGÜR TARAYICI İÇİN OTOMATİK İNDİRME TETİKLEYİCİSİ
                const dataURL = canvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.download = 'Nalcaci_Taktik_' + new Date().getTime() + '.png';
                link.href = dataURL;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                // İşlem bitince ekranı güncelle
                spinner.style.display = 'none';
                statusLog.innerText = "✅ İndirme Başarılı!";
                subLog.innerHTML = "Taktik resmi telefonunuza kaydedildi.<br><br><b>Bu sekmeyi kapatıp uygulamaya dönebilirsiniz.</b>";

            } catch (error) {
                statusLog.innerText = "Render Hatası: " + error.message;
                statusLog.style.color = "#EF4444";
                spinner.style.display = 'none';
            }
        }

        window.onload = () => {
            preloadImages(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const dataParam = urlParams.get('data');
                if (dataParam) renderAndDownload(dataParam);
            });
        };
    </script>
</body>
</html>
