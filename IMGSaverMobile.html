<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobil Taktik Önizleme</title>
    <style>
        body {
            background-color: #08160D;
            color: #ffffff;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        /* 
           2. İSTEK: MOBİL İÇİN 90 DERECE ROTASYON
           Clomosy tarafındaki RotationAngle=90 mantığını burada CSS ile taklit ediyoruz. 
           Böylece yazılar ve butonlar kullanıcıya tam yatay ve düzgün görünecek.
        */
        .mobile-rotate-container {
            transform: rotate(90deg);
            transform-origin: center;
            width: 100vh;  /* Yükseklik ve Genişlik yer değiştirdi */
            height: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        #finalImage {
            max-width: 90%;
            max-height: 65vh; /* Ekrana sığması için */
            border: 3px solid #3DE482;
            border-radius: 10px;
            display: none;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.6);
            object-fit: contain;
        }

        button {
            background-color: #16A64B;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            width: 80%;
            max-width: 350px;
            display: none;
            box-shadow: 0px 4px 10px rgba(22, 166, 75, 0.4);
        }
        button:active { background-color: #11823B; transform: scale(0.98); }
        
        .log { 
            color: #3DE482; 
            font-size: 18px; 
            font-weight: bold; 
            text-align: center; 
            margin-bottom: 15px;
        }
        
        canvas { display: none; } /* Canvas sadece arka planda çizim için kullanılır */
    </style>
</head>
<body>

    <div class="mobile-rotate-container">
        <div id="statusLog" class="log">Taktik İşleniyor... Lütfen Bekleyin.</div>
        <img id="finalImage" alt="Rendered Tactic" />
        <button id="shareBtn">📤 Paylaş / Galeriye Kaydet</button>
    </div>

    <canvas id="renderCanvas"></canvas>

<script>
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');
        const statusLog = document.getElementById('statusLog');

        // 1. İSTEK: MOBİL İÇİN DİKEY SAHA BOYUTU
        const ASSETS = {
            Background: 'https://raw.githubusercontent.com/kaanl0/Clomosy_Nalcaci_Project/main/dikeysaha2.jpg',
            Ball: 'https://raw.githubusercontent.com/kaanl0/Clomosy_Nalcaci_Project/main/ball.png'
        };
        const loadedImages = {};

        function preloadImages(callback) {
            let loadedCount = 0;
            const keys = Object.keys(ASSETS);
            keys.forEach(key => {
                const img = new Image();
                img.crossOrigin = "Anonymous"; 
                img.onload = () => {
                    loadedImages[key] = img;
                    loadedCount++;
                    if (loadedCount === keys.length) callback();
                };
                img.onerror = () => {
                    statusLog.innerText = "Hata: " + key + " yüklenemedi!";
                    statusLog.style.color = "#EF4444";
                };
                img.src = ASSETS[key];
            });
        }

        function renderAndDisplay(jsonPayload) {
            try {
                const elements = typeof jsonPayload === 'string' ? JSON.parse(jsonPayload) : jsonPayload;
                const bgImg = loadedImages.Background;
                
                // Canvas boyutunu tam olarak mobil sahanın orijinal piksel boyutuna kilitliyoruz.
                canvas.width = bgImg.width;
                canvas.height = bgImg.height;

                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);

                elements.forEach(el => {
                    const cx = el.x * canvas.width;
                    const cy = el.y * canvas.height;
                    const w = el.width * canvas.width;
                    const h = el.height * canvas.height;
                    const angleRad = el.angle * (Math.PI / 180);

                    ctx.save();
                    ctx.translate(cx, cy);
                    ctx.rotate(angleRad);

                    if (el.type === 'Ball' && loadedImages.Ball) {
                        ctx.drawImage(loadedImages.Ball, -w / 2, -h / 2, w, h);
                    } 
                    else if (el.type === 'Player' || el.type === 'Opponent') {
                        ctx.beginPath();
                        ctx.ellipse(0, 0, w / 2, h / 2, 0, 0, 2 * Math.PI);
                        ctx.fillStyle = el.type === 'Player' ? "#3B82F6" : "#EF4444";
                        ctx.fill();
                        ctx.lineWidth = 2; 
                        ctx.strokeStyle = "#FFFFFF"; 
                        ctx.stroke();
                    } 
                    else if (el.type === 'Line' || el.type === 'Arrow') { 
                        ctx.fillStyle = "#EF4444"; 
                        ctx.fillRect(-w / 2, -h / 2, w, Math.max(h, 4)); 
                    } 
                    else if (el.type === 'Rect') { 
                        ctx.strokeStyle = "#EF4444"; 
                        ctx.lineWidth = 3; 
                        ctx.strokeRect(-w / 2, -h / 2, w, h); 
                    } 
                    else if (el.type === 'Circle') { 
                        ctx.strokeStyle = "#EF4444"; 
                        ctx.lineWidth = 3; 
                        ctx.beginPath(); 
                        ctx.ellipse(0, 0, w / 2, h / 2, 0, 0, 2 * Math.PI); 
                        ctx.stroke(); 
                    } 
                    else if (el.type === 'Text' && el.text_content) { 
                        ctx.fillStyle = "#FFFFFF"; 
                        ctx.font = "bold 20px Arial"; 
                        ctx.textAlign = "center"; 
                        ctx.textBaseline = "middle"; 
                        ctx.fillText(el.text_content, 0, 0); 
                    }

                    ctx.restore();
                });

                // Çizimi tamamla ve HTML içindeki <img> etiketine aktar
                const dataURL = canvas.toDataURL("image/png");
                const finalImg = document.getElementById('finalImage');
                finalImg.src = dataURL;
                finalImg.style.display = 'block';
                statusLog.innerText = "Taktik Hazır!";

                // 3. İSTEK: İNDİRMEYİ ENGELLEYEN YAPIYI AŞMA (NATIVE SHARE API)
                const shareBtn = document.getElementById('shareBtn');
                shareBtn.style.display = 'block';
                
                shareBtn.onclick = () => {
                    canvas.toBlob((blob) => {
                        const file = new File([blob], 'Nalcaci_Taktik.png', { type: 'image/png' });
                        
                        // Mobil işletim sisteminin kendi paylaşım/kaydetme menüsünü aç
                        if (navigator.canShare && navigator.canShare({ files: [file] })) {
                            navigator.share({
                                title: 'Nalçacılılar Taktik Tahtası',
                                text: 'Sahadaki taktiğimi incele!',
                                files: [file]
                            }).catch(err => {
                                console.error("Paylaşım iptal edildi veya hata oluştu:", err);
                            });
                        } else {
                            // Cihaz Native Share desteklemiyorsa Klasik İndirme (Fallback)
                            const url = URL.createObjectURL(blob);
                            const link = document.createElement('a');
                            link.download = 'Nalcaci_Taktik.png';
                            link.href = url;
                            link.click();
                            URL.revokeObjectURL(url);
                        }
                    }, 'image/png');
                };
            } catch (error) {
                statusLog.innerText = "Render Error: " + error.message;
                statusLog.style.color = "#EF4444";
            }
        }

        window.onload = () => {
            preloadImages(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const dataParam = urlParams.get('data');
                if (dataParam) renderAndDisplay(dataParam);
                else {
                    statusLog.innerText = "Hata: JSON verisi bulunamadı.";
                    statusLog.style.color = "#EF4444";
                }
            });
        };
    </script>
</body>
</html>
